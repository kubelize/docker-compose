services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    restart: unless-stopped
    environment:
      # Public IP or DNS name clients should connect to
      - WG_HOST=YOUR_PUBLIC_IP_OR_DOMAIN
      # Generate with: docker run --rm ghcr.io/wg-easy/wg-easy:15 wgpw 'your-password'
      - PASSWORD_HASH=YOUR_BCRYPT_PASSWORD_HASH
      - WG_DEFAULT_DNS=10.130.5.3
      - WG_PORT=51820
      - PORT=51821
    volumes:
      - ./data:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
      - "80:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.default.forwarding=1
