server {
    listen 8080;
    server_name _;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location = / {
        default_type text/html;
        return 200 '
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>proxy-core</title>
</head>
<body>
  <h1>proxy-core</h1>
  <ul>
    <li><a href="/vault/">Hashicorp Vault</a></li>
    <li><a href="/homeassistant/">Home Assistant</a></li>
  </ul>
</body>
</html>';
    }

    location /vault/ {
        proxy_pass http://10.130.5.239:8200/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

        location /homeassistant/ {
        proxy_pass http://10.130.5.233:8123/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

        location /pinchflat/ {
        proxy_pass http://10.130.5.232:8945/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}