# IMPORTANT: unprivileged container cannot write to /run
pid /tmp/nginx.pid;

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Basic config
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging to Docker stdout/stderr
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Required for WebSockets (Vault UI, ArgoCD, etc.)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Optional: better proxy defaults (nice to have)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts (helpful for slow backends like Vault)
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Include your actual routing config
    include /etc/nginx/conf.d/*.conf;
}