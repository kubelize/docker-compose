include "/tmp/externaldns.key";

options {
    directory "/tmp";

    listen-on port 53 { any; };
    listen-on-v6 { any; };

    recursion yes;
    allow-query { any; };
    allow-recursion { any; };

    forwarders {
        10.130.5.1;
    };
    forward only;

    dnssec-validation no;
};

zone "internal" IN {
    type primary;
    file "/zones/db.internal";
    allow-update { key "externaldns-key"; };
};

zone "home" IN {
    type forward;
    forward only;
    forwarders { 10.130.5.1; };
};
