services:
  bind9:
    image: internetsystemsconsortium/bind9:9.20
    container_name: bind9
    user: "1000:1000"
    restart: unless-stopped
    network_mode: host
    entrypoint: ["/bin/sh", "-ec"]
    command: |
      : "${RFC2136_TSIG_SECRET:?RFC2136_TSIG_SECRET is required}"
      sed "s|\${RFC2136_TSIG_SECRET}|${RFC2136_TSIG_SECRET}|g" /etc/bind/named.conf.template > /tmp/named.conf
      exec named -u 1000 -c /tmp/named.conf -g
    environment:
      - RFC2136_TSIG_SECRET=${RFC2136_TSIG_SECRET}
    volumes:
      - ./named.conf:/etc/bind/named.conf.template:ro
      - ./zones:/zones
